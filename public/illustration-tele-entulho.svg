<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="skyGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="truckGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ee6a03;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d45a00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cacambaGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dfb43e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#skyGradient2)"/>

  <!-- Speed lines - Motion effect -->
  <g opacity="0.3" filter="url(#blur)">
    <line x1="20" y1="120" x2="80" y2="120" stroke="#ee6a03" stroke-width="2" stroke-linecap="round"/>
    <line x1="15" y1="150" x2="75" y2="150" stroke="#dfb43e" stroke-width="2" stroke-linecap="round"/>
    <line x1="25" y1="180" x2="85" y2="180" stroke="#ee6a03" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="240" width="400" height="60" fill="#c0c0c0" opacity="0.6"/>
  <line x1="0" y1="240" x2="400" y2="240" stroke="#aaa" stroke-width="2" opacity="0.4"/>

  <!-- Caçamba being lifted - positioned high -->
  <g filter="url(#shadow2)" opacity="0.95">
    <!-- Container box -->
    <path d="M 240 80 L 310 80 L 300 140 L 250 140 Z"
          fill="url(#cacambaGradient2)" stroke="#c99d31" stroke-width="2"/>

    <!-- Container highlight -->
    <line x1="240" y1="80" x2="310" y2="80" stroke="#ffd95a" stroke-width="2" opacity="0.7"/>

    <!-- Side accent -->
    <rect x="310" y="80" width="8" height="60" fill="#ee6a03" opacity="0.8"/>

    <!-- Debris inside -->
    <rect x="260" y="95" width="12" height="8" fill="#c74a3a" opacity="0.8"/>
    <rect x="280" y="105" width="14" height="8" fill="#d85f50" opacity="0.8"/>
    <rect x="255" y="115" width="16" height="8" fill="#8b6f47" opacity="0.8"/>
  </g>

  <!-- Crane/Lift cable - angled -->
  <line x1="275" y1="60" x2="140" y2="30" stroke="#333" stroke-width="2.5" opacity="0.7"/>
  <line x1="275" y1="65" x2="140" y2="35" stroke="#333" stroke-width="2.5" opacity="0.7"/>

  <!-- Crane hook connection -->
  <circle cx="275" cy="62" r="4" fill="#555"/>
  <path d="M 273 66 Q 273 72 275 78" stroke="#555" stroke-width="2" fill="none"/>
  <path d="M 277 66 Q 277 72 275 78" stroke="#555" stroke-width="2" fill="none"/>

  <!-- Truck bed/chassis -->
  <g filter="url(#shadow2)">
    <!-- Truck body -->
    <rect x="80" y="180" width="140" height="50" fill="url(#truckGradient)" rx="3"/>

    <!-- Truck cabin -->
    <rect x="50" y="185" width="35" height="40" fill="#d45a00" rx="2"/>
    <rect x="55" y="190" width="20" height="15" fill="#87ceeb" rx="1"/>

    <!-- Windshield detail -->
    <rect x="55" y="190" width="20" height="15" fill="#87ceeb" opacity="0.7" rx="1"/>
  </g>

  <!-- Truck wheels -->
  <g filter="url(#shadow2)">
    <!-- Front wheel -->
    <circle cx="75" cy="240" r="10" fill="#333"/>
    <circle cx="75" cy="240" r="6" fill="#555"/>
    <circle cx="75" cy="240" r="3" fill="#111"/>

    <!-- Rear wheel left -->
    <circle cx="165" cy="240" r="11" fill="#333"/>
    <circle cx="165" cy="240" r="7" fill="#555"/>
    <circle cx="165" cy="240" r="3" fill="#111"/>

    <!-- Rear wheel right -->
    <circle cx="195" cy="240" r="11" fill="#333"/>
    <circle cx="195" cy="240" r="7" fill="#555"/>
    <circle cx="195" cy="240" r="3" fill="#111"/>
  </g>

  <!-- Speed indicator arrows -->
  <g opacity="0.75">
    <path d="M 320 100 L 330 100 L 325 95 M 330 100 L 325 105" stroke="#ee6a03" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 320 140 L 330 140 L 325 135 M 330 140 L 325 145" stroke="#dfb43e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Clock/Timer icon - representing speed -->
  <g opacity="0.85">
    <circle cx="350" cy="80" r="18" fill="none" stroke="#dfb43e" stroke-width="2"/>
    <line x1="350" y1="65" x2="350" y2="75" stroke="#dfb43e" stroke-width="2" stroke-linecap="round"/>
    <line x1="350" y1="80" x2="360" y2="80" stroke="#dfb43e" stroke-width="2" stroke-linecap="round"/>
    <!-- Arrow showing movement -->
    <path d="M 350 75 L 358 83" stroke="#ee6a03" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- "RÁPIDO" or speed badge -->
  <g opacity="0.9">
    <rect x="330" y="200" width="55" height="30" fill="#ee6a03" rx="3"/>
    <text x="357" y="220" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">RÁPIDO</text>
  </g>

  <!-- Checkmark - trust element -->
  <g opacity="0.8">
    <circle cx="60" cy="270" r="16" fill="#dfb43e"/>
    <path d="M 53 270 L 57 275 L 68 264" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>