<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="groundGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4d4d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0c0c0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cacambaGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dfb43e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#skyGradient)"/>

  <!-- Ground -->
  <ellipse cx="200" cy="280" rx="180" ry="35" fill="url(#groundGradient)" opacity="0.8"/>

  <!-- Ground detail - brick pattern -->
  <g opacity="0.3">
    <rect x="80" y="240" width="20" height="15" fill="#999" rx="1"/>
    <rect x="110" y="245" width="20" height="15" fill="#888" rx="1"/>
    <rect x="140" y="242" width="20" height="15" fill="#999" rx="1"/>
    <rect x="170" y="246" width="20" height="15" fill="#888" rx="1"/>
    <rect x="200" y="243" width="20" height="15" fill="#999" rx="1"/>
    <rect x="230" y="247" width="20" height="15" fill="#888" rx="1"/>
    <rect x="260" y="244" width="20" height="15" fill="#999" rx="1"/>
    <rect x="290" y="248" width="20" height="15" fill="#888" rx="1"/>
  </g>

  <!-- Caçamba Main Body - Container -->
  <g filter="url(#shadow)">
    <!-- Back support beam -->
    <rect x="100" y="140" width="12" height="110" fill="#333" rx="2"/>
    <rect x="288" y="140" width="12" height="110" fill="#333" rx="2"/>

    <!-- Main container box -->
    <path d="M 120 160 L 280 160 L 270 240 L 130 240 Z"
          fill="url(#cacambaGradient)" stroke="#c99d31" stroke-width="2"/>

    <!-- Container front edge highlight -->
    <line x1="120" y1="160" x2="280" y2="160" stroke="#ffd95a" stroke-width="3" opacity="0.6"/>

    <!-- Side accent - darker orange -->
    <rect x="280" y="160" width="12" height="80" fill="#ee6a03" opacity="0.7"/>
  </g>

  <!-- Debris inside caçamba -->
  <g opacity="0.85">
    <!-- Brick pieces -->
    <rect x="140" y="175" width="18" height="12" fill="#c74a3a" rx="1"/>
    <rect x="170" y="185" width="16" height="14" fill="#d85f50" rx="1"/>
    <rect x="200" y="178" width="20" height="13" fill="#c74a3a" rx="1"/>
    <rect x="235" y="190" width="18" height="12" fill="#d85f50" rx="1"/>

    <!-- Wood pieces -->
    <rect x="155" y="205" width="25" height="8" fill="#8b6f47" rx="1"/>
    <rect x="195" y="210" width="28" height="7" fill="#7a5c38" rx="1"/>
    <rect x="240" y="208" width="23" height="8" fill="#8b6f47" rx="1"/>

    <!-- Concrete/rubble -->
    <circle cx="145" cy="225" r="5" fill="#9a9a9a"/>
    <circle cx="180" cy="230" r="4" fill="#ababab"/>
    <circle cx="220" cy="227" r="5" fill="#9a9a9a"/>
    <circle cx="255" cy="232" r="4" fill="#ababab"/>
  </g>

  <!-- Wheels - Left -->
  <g filter="url(#shadow)">
    <circle cx="135" cy="250" r="12" fill="#333"/>
    <circle cx="135" cy="250" r="8" fill="#555"/>
    <circle cx="135" cy="250" r="4" fill="#111"/>
  </g>

  <!-- Wheels - Right -->
  <g filter="url(#shadow)">
    <circle cx="265" cy="250" r="12" fill="#333"/>
    <circle cx="265" cy="250" r="8" fill="#555"/>
    <circle cx="265" cy="250" r="4" fill="#111"/>
  </g>

  <!-- Handle/Grip -->
  <rect x="195" y="235" width="10" height="15" fill="#444" rx="2" filter="url(#shadow)"/>

  <!-- Checkmark accent - trust symbol -->
  <g opacity="0.9">
    <circle cx="340" cy="60" r="22" fill="#dfb43e" opacity="0.9"/>
    <path d="M 333 60 L 337 65 L 347 52" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Company accent - top right corner -->
  <text x="360" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#dfb43e" opacity="0.6">MM</text>
</svg>