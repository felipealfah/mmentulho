name = "cacambasbrasilia"
type = "javascript"
account_id = ""
workers_dev = true
main = "src/index.ts"
site = { bucket = "dist" }
build = { command = "npm run build" }
compatibility_date = "2024-12-19"

# Environment configuration
[env.production]
routes = [
  { pattern = "mmentulho.com.br/*", zone_id = "" }
]

# Build configuration
[build]
command = "npm run build"
cwd = "./"
watch_paths = ["src/**/*.{js,ts,jsx,tsx,astro}"]

# Triggers for Cloudflare Pages
[triggers]
crons = []
