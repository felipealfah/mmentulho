# Configuração Wrangler para MM Entulho - Cloudflare Pages
name = "mmentulho"
type = "javascript"
account_id = ""
workers_dev = true
route = ""
zone_id = ""

[env.production]
routes = [
  { pattern = "mmentulho.com.br", zone_name = "" }
]

[build]
command = "npm run build"
cwd = "./"
watch_paths = ["src/**/*.ts", "src/**/*.astro"]

[build.upload]
format = "modules"
main = "dist/_worker.js"
